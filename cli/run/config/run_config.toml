
[[release_projects]]
name = "rust"
path = "."
package_type = "cargo"

[[release_projects]]
name = "ui"
path = "ui"
package_type = "bun"

[[release_projects]]
name = "rust"
path = "ui/src-tauri"
package_type = "tauri-toml"


# dev command
[[commands]]
name = "dev"
description = "Run the application in development mode"

[[commands.cmds]]
cmd = "cargo"
args = ["tauri", "dev"]
run_dir = "."
always_run = true

# dev:android command
[[commands]]
name = "dev:android"
description = "Run the application in development mode on Android"

[[commands.cmds]]
cmd = "bun"
args = ["android"]
run_dir = "ui"
always_run = true

# dev:ios command
[[commands]]
name = "dev:ios"
description = "Run the application in development mode on iOS"

[[commands.cmds]]
cmd = "bun"
args = ["ios"]
run_dir = "ui"
always_run = true


# build command
[[commands]]
name = "build"
description = "Build the application for Windows"

[[commands.cmds]]
cmd = "cargo"
args = ["tauri", "build"]
run_dir = "."


# build:android command
[[commands]]
name = "build:android"
description = "Build the application for Android"

[[commands.cmds]]
cmd = "bun"
args = ["prebuild:android:prod"]
run_dir = "ui"

[[commands.cmds]]
cmd = "bun"
args = ["build:android"]
run_dir = "ui"


# build:ios command
[[commands]]
name = "build:ios"
description = "Build the application for iOS"

[[commands.cmds]]
cmd = "bun"
args = ["prebuild:ios:prod"]
run_dir = "ui"

[[commands.cmds]]
cmd = "bun"
args = ["build:ios"]
run_dir = "ui"


# icon command
[[commands]]
name = "icon"
description = "Generate Icon"

[[commands.cmds]]
cmd = "cargo"
args = [
  "run",
  "--manifest-path=cli/Cargo.toml",
  "--release",
  "--package",
  "icon-gen",
]
