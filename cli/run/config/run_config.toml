
[[release_projects]]
name = "rust"
path = "rust"
package_type = "."


# dev command
[[commands]]
name = "dev"
description = "Run the application in development mode"

[[commands.cmds]]
cmd = "cargo"
args = ["tauri", "dev"]
run_dir = "ui/src-tauri"
always_run = true


# build command
[[commands]]
name = "build"
description = "Build the application for Windows"

[[commands.cmds]]
cmd = "cargo"
args = ["tauri", "build"]
run_dir = "ui/src-tauri"


# build:android command
[[commands]]
name = "build:android"
description = "Build the application for Android"

[[commands.cmds]]
cmd = "cargo"
args = ["tauri", "android", "build"]
run_dir = "ui/src-tauri"


# build:ios command
[[commands]]
name = "build:ios"
description = "Build the application for iOS"

[[commands.cmds]]
cmd = "cargo"
args = ["tauri", "ios", "build"]
run_dir = "ui/src-tauri"


# icon command
[[commands]]
name = "icon"
description = "Generate Icon"

[[commands.cmds]]
cmd = "cargo"
args = [
    "run",
    "--manifest-path=cli/Cargo.toml",
    "--release",
    "--package",
    "icon-gen",
]
