productName = "lonanote"
version = "1.1.0"
identifier = "com.luoluoqixi.lonanote"

[build]
beforeDevCommand = "bun web"
beforeBuildCommand = "bun build:web"
# beforeBuildCommand = "bun build:web:sourcemap"
# beforeBuildCommand = "bun build:web:dev"
frontendDist = "../dist"
devUrl = "http://localhost:8081"

[bundle]
icon = [
  "icons/32x32.png",
  "icons/128x128.png",
  "icons/128x128@2x.png",
  "icons/icon.icns",
  "icons/icon.ico",
]
active = true
targets = "all"
createUpdaterArtifacts = false

[app]
withGlobalTauri = true

# Legacy auto-created main window template kept for reference during
# manual window bootstrap migration.
# [[app.windows]]
# decorations = false
# label = "main"
# title = "lonanote"
# tabbingIdentifier = "main"
# width = 1024
# height = 576

[[app.windows]]
create = false
decorations = false
label = "main"
title = "lonanote"
tabbingIdentifier = "main"
visible = false
width = 1024
height = 576

[app.security]
# csp = "default-src 'self' ipc: http://ipc.localhost; img-src 'self' asset: http://asset.localhost"
assetProtocol = { scope = ["**/*"], enable = true }
